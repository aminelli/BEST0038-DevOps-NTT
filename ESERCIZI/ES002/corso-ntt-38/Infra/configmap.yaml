---
apiVersion: v1
kind: ConfigMap
metadata:
  name: corso-ntt-38-config
  namespace: corso-ntt-38
  labels:
    app: corso-ntt-38
data:
  # Configurazione JAVA_OPTS
  java-opts: |
    -Xms256m
    -Xmx768m
    -XX:+UseG1GC
    -XX:MaxGCPauseMillis=200
    -XX:+UseStringDeduplication
    -Djava.security.egd=file:/dev/./urandom
    -Dspring.profiles.active=production
  
  # Log level
  log-level: "INFO"
  
  # Application properties
  application.properties: |
    # Server configuration
    server.port=8080
    server.shutdown=graceful
    spring.lifecycle.timeout-per-shutdown-phase=30s
    
    # Spring Boot Actuator
    management.endpoints.web.exposure.include=health,info,metrics,prometheus
    management.endpoint.health.show-details=when-authorized
    management.health.livenessState.enabled=true
    management.health.readinessState.enabled=true
    
    # Logging
    logging.level.root=INFO
    logging.level.com.corso.devops=INFO
    logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
    logging.file.name=/app/logs/application.log
    logging.file.max-size=10MB
    logging.file.max-history=7
    
    # Security
    spring.security.user.name=user
    spring.security.user.password=user123
    
    # Database (se necessario, decommentare e configurare)
    # spring.datasource.url=jdbc:postgresql://postgres-service:5432/corsontt38
    # spring.datasource.username=${DB_USERNAME}
    # spring.datasource.password=${DB_PASSWORD}
