---
# Secret per credenziali e dati sensibili
# NOTA: In produzione, usa strumenti come Sealed Secrets, External Secrets, o Vault
apiVersion: v1
kind: Secret
metadata:
  name: corso-ntt-38-secret
  namespace: corso-ntt-38
  labels:
    app: corso-ntt-38
type: Opaque
data:
  # Le credenziali sono codificate in base64
  # Per generare: echo -n "valore" | base64
  
  # Database credentials (esempio)
  # db-username: Y29yc29udHQzOA==  # corsontt38
  # db-password: c3VwZXJzZWNyZXQ=  # supersecret
  
  # Spring Security users (se gestiti via secret)
  admin-username: YWRtaW4=        # admin
  admin-password: YWRtaW4xMjM=    # admin123
  
  user-username: dXNlcg==          # user
  user-password: dXNlcjEyMw==      # user123
  
  mario-username: bWFyaW8=         # mario
  mario-password: bWFyaW8xMjM=     # mario123

---
# Secret per Docker Registry (se usi registry privato)
# Crea con: kubectl create secret docker-registry regcred --docker-server=<registry> --docker-username=<user> --docker-password=<pwd> --docker-email=<email> -n corso-ntt-38
