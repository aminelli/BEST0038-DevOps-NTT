<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Login - Corso NTT 38')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
    
    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <!-- Main Content -->
    <main class="flex-shrink-0">
        <div class="container">
            <div class="row justify-content-center mt-5">
                <div class="col-md-6 col-lg-5">
                    <!-- Login Card -->
                    <div class="card shadow-lg">
                        <div class="card-header bg-primary text-white text-center py-4">
                            <h3 class="mb-0">
                                <i class="bi bi-box-arrow-in-right"></i> Login
                            </h3>
                        </div>
                        <div class="card-body p-4">
                            
                            <!-- Error Message -->
                            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                <span th:text="${errorMessage}">Errore</span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                            
                            <!-- Logout Success Message -->
                            <div th:if="${logoutMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                                <i class="bi bi-check-circle-fill"></i>
                                <span th:text="${logoutMessage}">Logout effettuato</span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                            
                            <!-- Login Form -->
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        <i class="bi bi-person"></i> Username
                                    </label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="username" 
                                           name="username" 
                                           placeholder="Inserisci username"
                                           required 
                                           autofocus>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="bi bi-key"></i> Password
                                    </label>
                                    <input type="password" 
                                           class="form-control" 
                                           id="password" 
                                           name="password" 
                                           placeholder="Inserisci password"
                                           required>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" 
                                           class="form-check-input" 
                                           id="remember-me" 
                                           name="remember-me">
                                    <label class="form-check-label" for="remember-me">
                                        Ricordami
                                    </label>
                                </div>
                                
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-box-arrow-in-right"></i> Accedi
                                    </button>
                                </div>
                            </form>
                        </div>
                        
                        <!-- Help Info -->
                        <div class="card-footer text-center bg-light">
                            <small class="text-muted">
                                <i class="bi bi-info-circle"></i>
                                <span th:text="${helpMessage}">Informazioni utente</span>
                            </small>
                        </div>
                    </div>
                    
                    <!-- Back to Home -->
                    <div class="text-center mt-3">
                        <a th:href="@{/}" class="text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Torna alla Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <!-- Scripts -->
    <div th:replace="~{fragments/footer :: scripts}"></div>
    
</body>
</html>
