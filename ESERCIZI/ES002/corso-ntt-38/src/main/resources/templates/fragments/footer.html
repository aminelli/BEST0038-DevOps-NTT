<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Footer Fragment -->
    <footer th:fragment="footer" class="footer mt-auto py-4 bg-dark text-light">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5><i class="bi bi-code-square"></i> Corso NTT 38</h5>
                    <p class="text-muted">Applicazione web Spring Boot dimostrativa</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-1">
                        <strong>Tecnologie:</strong> Java 21, Spring Boot 4.0, Bootstrap 5
                    </p>
                    <p class="text-muted mb-0">
                        &copy; <span th:text="${#dates.year(#dates.createNow())}">2024</span> - DevOps Course
                    </p>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Scripts Fragment -->
    <div th:fragment="scripts">
        <!-- Bootstrap 5 JS Bundle (includes Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" 
                crossorigin="anonymous"></script>
        
        <!-- Custom JS -->
        <script th:src="@{/js/custom.js}"></script>
    </div>
</body>
</html>
