<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <!-- Navbar Fragment -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <!-- Logo/Brand -->
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-code-square"></i> Corso NTT 38
            </a>
            
            <!-- Hamburger button per mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav" aria-controls="navbarNav" 
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Menu Items -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- Link pubblici -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">
                            <i class="bi bi-house-door"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/about}">
                            <i class="bi bi-info-circle"></i> About
                        </a>
                    </li>
                    
                    <!-- Link area privata (solo se autenticato) -->
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/private/dashboard}">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                </ul>
                
                <!-- User info e Login/Logout -->
                <div class="d-flex align-items-center">
                    <!-- Se NON autenticato: mostra Login -->
                    <div sec:authorize="!isAuthenticated()">
                        <a class="btn btn-outline-light" th:href="@{/login}">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </a>
                    </div>
                    
                    <!-- Se autenticato: mostra username e Logout -->
                    <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                        <span class="navbar-text text-light me-3">
                            <i class="bi bi-person-circle"></i> 
                            <span sec:authentication="name">Username</span>
                        </span>
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
